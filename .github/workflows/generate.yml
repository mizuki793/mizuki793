name: Generate CV Doc

on: push

jobs:
  convert_via_pandoc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run:  mkdir output && sed -n -e '/## 経歴/,/## その他/p' ./README.md >./out_readme.md | sed -i -e '$d' ./out_readme.md
      - uses: docker://ghcr.io/44smkn/pandoc/ja:0.1.1
        with:
          args: out_readme.md --from=markdown --to=docx --reference-doc=reference.docx -o output/resume.docx
      - uses: actions/upload-artifact@master
        with:
          name: output
          path: output/resume.docx
      - name: publish to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run:
          aws s3 cp output/resume.docx s3://resumes-202205191002
